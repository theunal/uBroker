name: Publish uBroker to NuGet

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore uBroker.slnx

      - name: Build
        run: dotnet build uBroker.slnx -c Release --no-restore

      - name: Unit Tests
        run: dotnet test tests/uBroker.UnitTests -c Release --no-build --verbosity normal

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore uBroker.slnx

      - name: Build
        run: dotnet build uBroker.slnx -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack src/uBroker.Core/uBroker.Core.csproj -c Release -o ./artifacts -p:PackageVersion=${{ steps.version.outputs.VERSION }} --no-build
          dotnet pack src/uBroker.RabbitMQ/uBroker.RabbitMQ.csproj -c Release -o ./artifacts -p:PackageVersion=${{ steps.version.outputs.VERSION }} --no-build
          dotnet pack src/uBroker.Kafka/uBroker.Kafka.csproj -c Release -o ./artifacts -p:PackageVersion=${{ steps.version.outputs.VERSION }} --no-build
          dotnet pack src/uBroker.Azure/uBroker.Azure.csproj -c Release -o ./artifacts -p:PackageVersion=${{ steps.version.outputs.VERSION }} --no-build
          dotnet pack src/uBroker.Aws/uBroker.Aws.csproj -c Release -o ./artifacts -p:PackageVersion=${{ steps.version.outputs.VERSION }} --no-build
          dotnet pack src/uBroker.Diagnostics/uBroker.Diagnostics.csproj -c Release -o ./artifacts -p:PackageVersion=${{ steps.version.outputs.VERSION }} --no-build
          dotnet pack src/uBroker.DependencyInjection/uBroker.DependencyInjection.csproj -c Release -o ./artifacts -p:PackageVersion=${{ steps.version.outputs.VERSION }} --no-build

      - name: Verify packages
        run: |
          echo "Packages to publish:"
          ls -la ./artifacts/*.nupkg
          echo "Expected: 7 packages"

      - name: Push to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --source https://api.nuget.org/v3/index.json --skip-duplicate

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: artifacts
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.nupkg
